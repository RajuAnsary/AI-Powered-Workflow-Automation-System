services:
  - type: web
    name: biztelai-api
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        sync: false
